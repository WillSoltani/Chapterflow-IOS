# SwiftLint configuration.
# Install: brew install swiftlint
# Run: swiftlint lint --strict

included:
  - ChapterFlow
  - Packages
  - NotificationService
  - NotificationContent

excluded:
  - "**/.build"
  - "**/Package.swift"
  - DerivedData

# ── Disabled rules ────────────────────────────────────────────────────────────
# Rules disabled because the existing codebase pre-dates strict enforcement.
# Re-enable and fix violations incrementally as the codebase matures.
disabled_rules:
  - todo
  - line_length
  # Short identifiers (i, m, c, n, s) are idiomatic in closures and previews.
  # Snake-case identifiers are used for Codable server-field matching.
  - identifier_name
  # Force casts/tries are intentional in test JSON-mutation helpers.
  - force_cast
  - force_try
  # Trailing commas and spacing rules: apply via swift-format in a future pass.
  - trailing_comma
  - comma
  - colon
  # Minor structural patterns accepted in the current codebase.
  - implicit_optional_initialization
  - static_over_final_class
  # String→Data via `.data(using:)` — fix progressively; test-file pattern.
  - non_optional_string_data_conversion
  # Type-length rules: large view files and generated code exceed defaults.
  - type_body_length
  # Nested types (e.g. CodingKeys inside a nested Decodable) exceed the 1-deep limit.
  - nesting
  # Trailing-closure style is acceptable when calling multi-closure APIs.
  - multiple_closures_with_trailing_closure
  # Duration * Double doesn't synthesise *=; the explicit form is required.
  - shorthand_operator

# ── Opt-in rules ─────────────────────────────────────────────────────────────
opt_in_rules:
  - closure_spacing
  - explicit_init
  - empty_count

# ── Rule thresholds ───────────────────────────────────────────────────────────
file_length:
  warning: 600
  error: 1000

function_body_length:
  warning: 80
  error: 120

cyclomatic_complexity:
  warning: 15
  error: 25

# ── Reporter ──────────────────────────────────────────────────────────────────
# CI overrides this with --reporter github-actions-logging.
reporter: "xcode"
