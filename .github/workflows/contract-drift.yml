name: Contract Drift — Backend-Owned Native Contract

on:
  pull_request:
    paths:
      - "contracts/native-ios/**"
      - "Packages/Models/**"
      - "Packages/Networking/**"
      - "Packages/**/Sources/**/*.swift"
      - "scripts/refresh-fixtures.sh"
      - "scripts/verify-backend-contract-provenance.sh"
      - "scripts/test-backend-contract-provenance.sh"
      - ".github/workflows/contract-drift.yml"
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-native-contract:
    name: Generate, compare, and consume backend contract
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out iOS
        uses: actions/checkout@v4
        with:
          path: ios
          persist-credentials: false

      - name: Resolve pinned backend contract source
        id: backend_source
        working-directory: ios
        run: |
          bundle=contracts/native-ios/v1/contract-bundle.json
          repository=$(jq -r '.provenance.backendRepository // ""' "$bundle")
          revision=$(jq -r '.provenance.sourceRevision // ""' "$bundle")
          phase=$(jq -r '.provenance.sourceRevisionPhase // ""' "$bundle")
          if [ "$repository" != "WillSoltani/ChapterFlow" ]; then
            echo "::error::Unexpected backend contract repository: $repository"
            exit 1
          fi
          if [[ ! "$revision" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::The iOS contract bundle must pin an exact 40-character backend sourceRevision."
            exit 1
          fi
          case "$phase" in
            committed_backend_branch|merged_backend) ;;
            *)
              echo "::error::Unsupported committed contract phase: $phase"
              exit 1
              ;;
          esac
          echo "sha=$revision" >> "$GITHUB_OUTPUT"
          echo "phase=$phase" >> "$GITHUB_OUTPUT"

      - name: Check out pinned public backend source
        uses: actions/checkout@v4
        with:
          repository: WillSoltani/ChapterFlow
          ref: ${{ steps.backend_source.outputs.sha }}
          path: backend
          fetch-depth: 0
          persist-credentials: false

      - name: Verify backend revision and integration phase
        working-directory: ios
        env:
          CHAPTERFLOW_BACKEND_REPO: ${{ github.workspace }}/backend
          CONTRACT_SOURCE_REVISION: ${{ steps.backend_source.outputs.sha }}
          CONTRACT_SOURCE_REVISION_PHASE: ${{ steps.backend_source.outputs.phase }}
        run: |
          git -C "$CHAPTERFLOW_BACKEND_REPO" fetch --no-tags origin main:refs/remotes/origin/main
          bash scripts/verify-backend-contract-provenance.sh

      - name: Exercise merge and squash-merge provenance canaries
        working-directory: ios
        run: bash scripts/test-backend-contract-provenance.sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.0
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Verify backend exporter and serializer fences
        working-directory: backend
        run: npm run contract:native:check

      - name: Regenerate twice and compare the committed iOS bundle
        working-directory: ios
        env:
          CHAPTERFLOW_BACKEND_REPO: ${{ github.workspace }}/backend
          CONTRACT_SOURCE_REVISION: ${{ steps.backend_source.outputs.sha }}
          CONTRACT_SOURCE_REVISION_PHASE: ${{ steps.backend_source.outputs.phase }}
        run: bash scripts/refresh-fixtures.sh --check

      - name: Consume canonical and compatible fixtures in Models
        working-directory: ios
        env:
          CLANG_MODULE_CACHE_PATH: ${{ runner.temp }}/chapterflow-contract/clang
          SWIFTPM_MODULECACHE_OVERRIDE: ${{ runner.temp }}/chapterflow-contract/swiftpm
        run: |
          swift test \
            --package-path Packages/Models \
            --scratch-path "${RUNNER_TEMP}/chapterflow-contract/models" \
            --parallel

      - name: Verify endpoint requests, errors, inventory, and drift canary
        working-directory: ios
        env:
          CLANG_MODULE_CACHE_PATH: ${{ runner.temp }}/chapterflow-contract/clang
          SWIFTPM_MODULECACHE_OVERRIDE: ${{ runner.temp }}/chapterflow-contract/swiftpm
        run: |
          swift test \
            --package-path Packages/Networking \
            --scratch-path "${RUNNER_TEMP}/chapterflow-contract/networking" \
            --parallel

      - name: Contract summary
        if: always()
        env:
          PINNED_BACKEND_REVISION: ${{ steps.backend_source.outputs.sha }}
          PINNED_BACKEND_PHASE: ${{ steps.backend_source.outputs.phase }}
        run: |
          echo "### Native contract drift" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source: backend-generated synthetic bundle" >> "$GITHUB_STEP_SUMMARY"
          echo "- Live production routes called: no" >> "$GITHUB_STEP_SUMMARY"
          echo "- Expected inventory: 83 operations / 93 native producers / 29 matrix rows" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pinned source: ${PINNED_BACKEND_REVISION:-unavailable} (${PINNED_BACKEND_PHASE:-unavailable})" >> "$GITHUB_STEP_SUMMARY"
          echo "- Coverage: 0 full / 60 partial / 23 blocked" >> "$GITHUB_STEP_SUMMARY"
          echo "- Native proof: request factories 6/93; success consumers 24/60" >> "$GITHUB_STEP_SUMMARY"
