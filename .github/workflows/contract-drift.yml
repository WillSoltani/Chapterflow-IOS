name: Contract Drift — Backend-Owned Native Contract

on:
  pull_request:
    paths:
      - "contracts/native-ios/**"
      - "Packages/Models/**"
      - "Packages/Networking/**"
      - "Packages/**/Sources/**/*.swift"
      - "scripts/refresh-fixtures.sh"
      - ".github/workflows/contract-drift.yml"
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-native-contract:
    name: Generate, compare, and consume backend contract
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Require cross-repository read credential
        env:
          CONTRACT_REPO_TOKEN: ${{ secrets.CONTRACT_REPO_TOKEN }}
        run: |
          if [ -z "$CONTRACT_REPO_TOKEN" ]; then
            echo "::error::CONTRACT_REPO_TOKEN is required to read WillSoltani/ChapterFlow."
            exit 1
          fi

      - name: Check out iOS
        uses: actions/checkout@v4
        with:
          path: ios

      - name: Check out backend source of truth
        uses: actions/checkout@v4
        with:
          repository: WillSoltani/ChapterFlow
          ref: main
          token: ${{ secrets.CONTRACT_REPO_TOKEN }}
          path: backend
          fetch-depth: 0

      - name: Record exact backend contract revision
        id: backend_revision
        working-directory: backend
        run: |
          contract_revision=$(git log -1 --format=%H -- contracts/native-ios/v1/contract-bundle.json)
          if [ -z "$contract_revision" ]; then
            echo "::error::No committed backend contract bundle revision was found."
            exit 1
          fi
          echo "sha=$contract_revision" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.0
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Verify backend exporter and serializer fences
        working-directory: backend
        run: npm run contract:native:check

      - name: Regenerate twice and compare the committed iOS bundle
        working-directory: ios
        env:
          CHAPTERFLOW_BACKEND_REPO: ${{ github.workspace }}/backend
          CONTRACT_SOURCE_REVISION: ${{ steps.backend_revision.outputs.sha }}
        run: bash scripts/refresh-fixtures.sh --check

      - name: Consume canonical and compatible fixtures in Models
        working-directory: ios
        env:
          CLANG_MODULE_CACHE_PATH: ${{ runner.temp }}/chapterflow-contract/clang
          SWIFTPM_MODULECACHE_OVERRIDE: ${{ runner.temp }}/chapterflow-contract/swiftpm
        run: |
          swift test \
            --package-path Packages/Models \
            --scratch-path "${RUNNER_TEMP}/chapterflow-contract/models" \
            --parallel

      - name: Verify endpoint requests, errors, inventory, and drift canary
        working-directory: ios
        env:
          CLANG_MODULE_CACHE_PATH: ${{ runner.temp }}/chapterflow-contract/clang
          SWIFTPM_MODULECACHE_OVERRIDE: ${{ runner.temp }}/chapterflow-contract/swiftpm
        run: |
          swift test \
            --package-path Packages/Networking \
            --scratch-path "${RUNNER_TEMP}/chapterflow-contract/networking" \
            --parallel

      - name: Contract summary
        if: always()
        working-directory: ios
        run: |
          echo "### Native contract drift" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source: backend-generated synthetic bundle" >> "$GITHUB_STEP_SUMMARY"
          echo "- Live production routes called: no" >> "$GITHUB_STEP_SUMMARY"
          echo "- Expected inventory: 83 operations / 93 native producers / 29 matrix rows" >> "$GITHUB_STEP_SUMMARY"
          if [ -f contracts/native-ios/v1/contract-bundle.json ]; then
            echo "- Behavior source: $(jq -r '.provenance.behaviorSourceRevision' contracts/native-ios/v1/contract-bundle.json)" >> "$GITHUB_STEP_SUMMARY"
            echo "- Coverage: $(jq -r '[.operations[].coverage] | group_by(.) | map({(.[0]): length}) | add' contracts/native-ios/v1/contract-bundle.json)" >> "$GITHUB_STEP_SUMMARY"
            echo "- Native proof: $(jq -r '.inventory.iosSourceEvidence | "request factories \(.exactFactoryTestedProducerCount)/93; success consumers \(.bundleSuccessDecoderTestedOperationCount)/60"' contracts/native-ios/v1/contract-bundle.json)" >> "$GITHUB_STEP_SUMMARY"
          fi
