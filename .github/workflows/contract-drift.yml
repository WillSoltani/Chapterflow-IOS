name: Contract Drift — Real-Contract & RF2 Tests

# Catches API schema drift before it reaches users. Runs weekly + on demand.
#
# Strategy (two tiers — the PUBLIC tier can NEVER silently skip):
#   1. PUBLIC tier (no token needed): re-capture the public endpoints
#      (catalog, search index, book detail) from production and run the
#      real-contract decode tests against the fresh captures. This is the tier
#      that would have caught the 2026-07-10 catalog mismatch
#      (docs/API-CONTRACT-MISMATCH-AND-RECONCILIATION-PLAN.md).
#   2. AUTHED tier: only when CF_CI_TOKEN (a valid Cognito id_token for the CI
#      test account) is configured — additionally captures /book/me/* +
#      chapter/quiz shapes. Absent token = loud warning, but the public tier
#      still gates the run.
#
# Any decoding failure = breaking drift = workflow FAILS.
#
# Companion script: scripts/refresh-fixtures.sh (public tier runs tokenless).
# Note: PRs also run the same decode tests against the COMMITTED prod_* captures
# via the normal package test suite in pr.yml — no network needed there. This
# workflow is what keeps those captures honest against the live API.

on:
  schedule:
    - cron: '0 2 * * 0'   # Every Sunday at 02:00 UTC
  workflow_dispatch:        # Manual trigger for on-demand drift checks

jobs:
  drift:
    name: Refresh Captures & Run Contract Tests
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Check for CI token (authed tier)
        id: token_check
        env:
          CF_CI_TOKEN: ${{ secrets.CF_CI_TOKEN }}
        run: |
          if [ -z "$CF_CI_TOKEN" ]; then
            echo "⚠️  CF_CI_TOKEN not set — AUTHED tier will be skipped."
            echo "  The PUBLIC tier still runs and gates this workflow."
            echo "  To enable full coverage: add CF_CI_TOKEN to repository secrets."
            echo "authed=false" >> "$GITHUB_OUTPUT"
          else
            echo "authed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache SPM repositories
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm/repositories
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # Re-capture live production responses into the contract fixtures.
      # Public tier always runs (no token); authed tier when the secret exists.
      # The script FAILS if any public capture fails — no silent skips.
      - name: Refresh contract captures from production
        env:
          CF_CI_TOKEN: ${{ secrets.CF_CI_TOKEN }}
          API_BASE_URL: ${{ secrets.CF_API_BASE_URL }}
        run: |
          chmod +x scripts/refresh-fixtures.sh
          bash scripts/refresh-fixtures.sh

      # Decode the FRESH captures with the shipped Codable models. Any failure
      # means production emitted JSON the app cannot tolerate — breaking drift.
      - name: Real-contract decode tests (fresh captures)
        run: swift test --package-path Packages/Models --parallel --filter "ContractTests"

      - name: RF2 evolution tests — Models
        run: swift test --package-path Packages/Models --parallel --filter "Evolution"

      - name: Fixtures package decode tests
        run: swift test --package-path Packages/Fixtures --parallel

      - name: Summary
        if: always()
        run: |
          echo "### Contract-Drift Result" >> "$GITHUB_STEP_SUMMARY"
          echo "- Public tier: captured + decode-tested against production" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.token_check.outputs.authed }}" = "true" ]; then
            echo "- Authed tier: captured + tested (CF_CI_TOKEN present)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Authed tier: ⚠️ SKIPPED (CF_CI_TOKEN not configured)" >> "$GITHUB_STEP_SUMMARY"
          fi
