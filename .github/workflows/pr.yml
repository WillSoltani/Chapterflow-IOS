name: PR — Build, Test & Lint

# Runs on every PR targeting main and on direct pushes to main.
# Configure "build-and-test", "lint", and "uitest" as required status checks
# in Settings → Branches → Branch protection rules for `main`.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # A narrowly scoped recovery mode may reuse the last green non-StoreKit
  # evidence only when the PR carries the ci-storekit-only label and every
  # subsequent change is part of the StoreKit test harness. Any broader diff
  # fails here before a required check can report success.
  scope:
    name: CI Scope
    runs-on: macos-15
    outputs:
      storekit_only: ${{ steps.scope.outputs.storekit_only }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Validate StoreKit-only recovery scope
        id: scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REQUESTED_STOREKIT_ONLY: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci-storekit-only') }}
        run: |
          set -euo pipefail

          if [[ "$REQUESTED_STOREKIT_ONLY" != "true" ]]; then
            echo "storekit_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$EVENT_NAME" != "pull_request" || -z "$PR_HEAD_SHA" ]]; then
            echo '::error title=Invalid recovery event::StoreKit-only recovery is available only to pull requests.'
            exit 1
          fi

          verified_base_sha="03747305819eccc8bb3c738a21e79d78a82d587d"
          if [[ "$PR_NUMBER" != "117" \
            || "$PR_HEAD_REF" != "codex/wp-rel-01" \
            || "$PR_BASE_SHA" != "$verified_base_sha" ]]; then
            echo '::error title=Invalid recovery provenance::PR, branch, or base no longer matches the verified run.'
            exit 1
          fi

          verified_sha="8b69f4f7eb860dc4da72a10510ca61f88d5fb6a1"
          if ! git merge-base --is-ancestor "$verified_sha" "$PR_HEAD_SHA"; then
            echo '::error title=Invalid recovery ancestry::The last green non-StoreKit evidence is not an ancestor of this head.'
            exit 1
          fi

          changed_entries="$(git diff --name-status --no-renames "$verified_sha" "$PR_HEAD_SHA")"
          if [[ -z "$changed_entries" ]]; then
            echo '::error title=Empty recovery diff::StoreKit-only recovery requires a concrete follow-up patch.'
            exit 1
          fi

          while IFS=$'\t' read -r status path; do
            case "$status:$path" in
              M:.github/workflows/pr.yml | \
              A:ChapterFlow-StoreKitTest.xctestplan | \
              M:ChapterFlow.xcodeproj/xcshareddata/xcschemes/ChapterFlow-StoreKitTest.xcscheme | \
              M:ChapterFlowUITests/ChapterFlowUITests.swift | \
              M:ChapterFlowUITests/Flows/PurchaseFlowTests.swift | \
              M:docs/ios/SIGNING-AND-RELEASE.md | \
              M:scripts/tests/test-storekit-catalog.py)
                ;;
              *)
                echo "::error title=Recovery scope expanded::$status $path is outside the fail-closed StoreKit allowlist."
                exit 1
                ;;
            esac
          done <<< "$changed_entries"

          echo "StoreKit-only recovery accepted for:"
          echo "$changed_entries"
          echo "storekit_only=true" >> "$GITHUB_OUTPUT"

  # ── 1. Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: macos-15
    needs: scope
    if: ${{ always() }}

    steps:
      - name: Require valid CI scope
        env:
          SCOPE_RESULT: ${{ needs.scope.result }}
        run: |
          if [[ "$SCOPE_RESULT" != "success" ]]; then
            echo '::error title=CI scope failed::Required checks cannot reuse prior evidence.'
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint StoreKit recovery sources (strict)
        if: needs.scope.outputs.storekit_only == 'true'
        run: |
          swiftlint lint --strict --reporter github-actions-logging \
            ChapterFlowUITests/ChapterFlowUITests.swift \
            ChapterFlowUITests/Flows/PurchaseFlowTests.swift

      - name: SwiftLint (strict)
        if: needs.scope.outputs.storekit_only != 'true'
        # github-actions-logging emits ::error:: annotations inline in the PR diff.
        run: swiftlint lint --strict --reporter github-actions-logging

  # ── 2. Build (iOS Simulator) + Unit Tests (all local packages) ───────────
  build-and-test:
    name: Build & Test
    # macos-26 ships Xcode 26 (iOS 26 SDK), which the app REQUIRES: RF5's Liquid
    # Glass APIs (.glassEffect, .buttonStyle(.glass)) do not exist in the iOS 18.x
    # SDK on macos-15's default Xcode, so #available(iOS 26) guards cannot save a
    # build there — the symbols are simply absent. Both the xcodebuild build and
    # the `swift test` of DesignSystem need the 26 toolchain.
    runs-on: ${{ needs.scope.outputs.storekit_only == 'true' && 'macos-15' || 'macos-26' }}
    needs: scope
    if: ${{ always() }}

    steps:
      - name: Require valid CI scope
        env:
          SCOPE_RESULT: ${{ needs.scope.result }}
        run: |
          if [[ "$SCOPE_RESULT" != "success" ]]; then
            echo '::error title=CI scope failed::Required checks cannot reuse prior evidence.'
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate StoreKit-only recovery wiring
        if: needs.scope.outputs.storekit_only == 'true'
        run: |
          python3 scripts/tests/test-storekit-catalog.py
          python3 -m json.tool ChapterFlow-StoreKitTest.xctestplan >/dev/null
          xmllint --noout \
            ChapterFlow.xcodeproj/xcshareddata/xcschemes/ChapterFlow-StoreKitTest.xcscheme

      # Select the newest installed Xcode 26 explicitly (no-op if already default)
      # and fail loudly, listing what IS available, if 26 is somehow missing.
      - name: Select Xcode 26
        if: needs.scope.outputs.storekit_only != 'true'
        run: |
          echo "Installed Xcodes:"; ls -d /Applications/Xcode*.app 2>/dev/null || true
          latest26="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          if [ -n "$latest26" ]; then
            sudo xcode-select -s "$latest26/Contents/Developer"
          fi
          xcodebuild -version

      - name: Test fail-closed release configuration
        if: needs.scope.outputs.storekit_only != 'true'
        run: bash scripts/tests/test-release-config.sh

      # Cache SPM state across runs:
      #  - the bare git repos (dependency source) used by both xcodebuild and swift test
      #  - the SHARED .build directory (see the test step) holding compiled dependency
      #    products — Amplify + the AWS SDK are large and otherwise recompile from source
      #    on every run.
      # Key: hash of every Package.resolved; restore-keys let an out-of-date cache seed an
      # incremental rebuild (SwiftPM re-verifies and rebuilds only what changed, so a stale
      # hit is never incorrect — at worst it rebuilds).
      - name: Cache SPM repositories & build
        if: needs.scope.outputs.storekit_only != 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm/repositories
            .spm-build
          # v2 bumps the key so the first run under this workflow SAVES a new cache that
          # includes .spm-build (a same-key hit would restore the old repos-only entry and
          # never re-save). Bump this suffix to invalidate the build cache.
          key: ${{ runner.os }}-spm-v2-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-v2-

      # Build the full app target for an iOS Simulator.
      # -skipPackagePluginValidation bypasses Xcode's trust prompt for
      #   Amplify's SmithyCodeGenerator build-tool plugin.
      # -skipMacroValidation bypasses Xcode's macro sandbox trust prompt.
      # CODE_SIGN_* settings disable signing (not required for simulator builds).
      - name: Build for iOS Simulator
        if: needs.scope.outputs.storekit_only != 'true'
        run: |
          set -o pipefail
          xcodebuild build \
            -project ChapterFlow.xcodeproj \
            -scheme ChapterFlow \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation \
            -skipMacroValidation

      # Compile the exact Release configuration without signing. This is not a
      # production-config proof—the fail-closed signed release workflow owns
      # that—but catches Release-only compiler/configuration regressions on PRs.
      - name: Build unsigned Release gate
        if: needs.scope.outputs.storekit_only != 'true'
        run: |
          set -o pipefail
          xcodebuild build \
            -project ChapterFlow.xcodeproj \
            -scheme ChapterFlow \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            BUILD_COMMIT_SHA="$GITHUB_SHA" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation \
            -skipMacroValidation

      # Run every local package test target on the macOS 26 runner. This includes
      # AppFeature (whose Tab API needs the newer host SDK) and SyncEngine; no
      # package may be represented as green through omission from this loop.
      - name: Run unit tests — all local packages
        if: needs.scope.outputs.storekit_only != 'true'
        shell: bash
        run: |
          set -uo pipefail
          failed=()

          packages=(
            Models
            CoreKit
            Networking
            Fixtures
            DesignSystem
            AIFeature
            AppFeature
            AuthKit
            EngagementFeature
            LibraryFeature
            NotificationsFeature
            OnboardingFeature
            PaywallFeature
            Persistence
            QuizFeature
            ReaderFeature
            SettingsFeature
            SocialFeature
            SyncEngine
          )

          # Share ONE build directory across every package's test run. The packages
          # form a diamond over CoreKit/Networking/Persistence/Models and the large
          # Amplify + AWS SDK graph; with a per-package .build each dependent recompiles
          # that whole graph independently (Amplify built ~17×). A shared --scratch-path
          # lets SwiftPM compile each dependency ONCE and reuse it. The loop is sequential,
          # so there are no concurrent writers to the shared directory.
          scratch="$GITHUB_WORKSPACE/.spm-build"

          for pkg in "${packages[@]}"; do
            echo "──────────────── Testing $pkg ────────────────"
            if swift test \
              --package-path "Packages/$pkg" \
              --scratch-path "$scratch" \
              --parallel; then
              echo "✓ $pkg passed"
            else
              echo "✗ $pkg FAILED"
              failed+=("$pkg")
            fi
          done

          if [ ${#failed[@]} -gt 0 ]; then
            echo ""
            echo "❌ Failed packages: ${failed[*]}"
            exit 1
          fi
          echo ""
          echo "✅ Full local package suite passed (${#packages[@]} packages)"

  # ── 3. Hermetic XCUITest flows (stub server, deterministic) ─────────────────
  # Runs the three critical UI flows (sign-in, read→quiz→unlock, purchase) against
  # a URLProtocol stub server fed by Fixtures. SmokeLane tests auto-skip unless
  # CF_REAL_API=1, so this job is always fully deterministic.
  # Required to merge; smoke lane skips are NOT treated as failures.
  ui-flows:
    name: Hermetic XCUITest Flows
    runs-on: macos-26
    needs: [scope, build-and-test]
    if: ${{ always() && needs.scope.result == 'success' && needs.build-and-test.result == 'success' && needs.scope.outputs.storekit_only != 'true' }}

    steps:
      - name: Require valid prerequisites
        env:
          BUILD_RESULT: ${{ needs.build-and-test.result }}
          SCOPE_RESULT: ${{ needs.scope.result }}
        run: |
          if [[ "$SCOPE_RESULT" != "success" || "$BUILD_RESULT" != "success" ]]; then
            echo '::error title=UI-test prerequisites failed::The StoreKit lane cannot replace failed prerequisite evidence.'
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode 26
        if: needs.scope.outputs.storekit_only != 'true'
        run: |
          echo "Installed Xcodes:"; ls -d /Applications/Xcode*.app 2>/dev/null || true
          latest26="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          if [ -n "$latest26" ]; then
            sudo xcode-select -s "$latest26/Contents/Developer"
          fi
          xcodebuild -version

      - name: Cache SPM repositories
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm/repositories
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # Snapshot pixels include system font, SF Symbol, and safe-area behavior.
      # Pin the exact recording device/runtime instead of silently accepting a
      # different simulator whose device traits would invalidate the references.
      # When the hosted image drops this runtime, CI fails and forces an explicit
      # review/re-record on the replacement toolchain.
      - name: Boot the pinned snapshot simulator
        if: needs.scope.outputs.storekit_only != 'true'
        run: |
          SIM_ID="$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          d = json.load(sys.stdin)
          for runtime, devices in d["devices"].items():
              if not runtime.endswith("iOS-26-5"):
                  continue
              for device in devices:
                  if device.get("isAvailable") and device["name"] == "iPhone 17e":
                      print(device["udid"])
                      raise SystemExit(0)
          ')"
          if [ -z "$SIM_ID" ]; then
            echo 'Required snapshot simulator unavailable: iPhone 17e / iOS 26.5'
            xcrun simctl list devices available
            exit 1
          fi
          echo "SIM_ID=$SIM_ID" >> "$GITHUB_ENV"
          echo "Booting $SIM_ID"
          xcrun simctl boot "$SIM_ID" 2>/dev/null || true
          xcrun simctl bootstatus "$SIM_ID" -b

      # Release visual suites model small-phone behavior and are UIKit-only.
      # Compare their committed references on the same pinned simulator used by
      # the deterministic UI flows, and fail if a renamed filter silently
      # selects fewer tests than expected.
      - name: Compare iOS release-surface snapshots
        if: needs.scope.outputs.storekit_only != 'true'
        shell: bash
        env:
          SNAPSHOT_RECORD: "0"
        run: |
          set -euo pipefail

          app_result="$RUNNER_TEMP/AppFeatureSnapshots.xcresult"
          paywall_result="$RUNNER_TEMP/PaywallFeatureSnapshots.xcresult"

          (
            cd Packages/AppFeature
            NSUnbufferedIO=YES xcodebuild test \
              -scheme AppFeature \
              -destination "platform=iOS Simulator,id=$SIM_ID" \
              -derivedDataPath "$RUNNER_TEMP/AppFeatureSnapshotsDerived" \
              -resultBundlePath "$app_result" \
              -only-testing:AppFeatureTests/ReleaseVisualSnapshotTests \
              -parallel-testing-enabled NO \
              -testLanguage en \
              -testRegion US \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              -skipPackagePluginValidation \
              -skipMacroValidation
          )

          xcrun xcresulttool get test-results summary \
            --path "$app_result" \
            --format json |
            python3 -c '
          import json, sys
          result = json.load(sys.stdin)
          counts = (
              result.get("passedTests"),
              result.get("failedTests"),
              result.get("skippedTests"),
          )
          if counts != (4, 0, 0):
              raise SystemExit(f"AppFeature snapshot count mismatch: {counts}")
          '

          (
            cd Packages/PaywallFeature
            NSUnbufferedIO=YES xcodebuild test \
              -scheme PaywallFeature \
              -destination "platform=iOS Simulator,id=$SIM_ID" \
              -derivedDataPath "$RUNNER_TEMP/PaywallFeatureSnapshotsDerived" \
              -resultBundlePath "$paywall_result" \
              -only-testing:PaywallFeatureTests/ReleaseVisualSnapshotTests \
              -parallel-testing-enabled NO \
              -testLanguage en \
              -testRegion US \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              -skipPackagePluginValidation \
              -skipMacroValidation
          )

          xcrun xcresulttool get test-results summary \
            --path "$paywall_result" \
            --format json |
            python3 -c '
          import json, sys
          result = json.load(sys.stdin)
          counts = (
              result.get("passedTests"),
              result.get("failedTests"),
              result.get("skippedTests"),
          )
          if counts != (4, 0, 0):
              raise SystemExit(f"PaywallFeature snapshot count mismatch: {counts}")
          '

          git diff --exit-code -- \
            Packages/AppFeature/Tests/AppFeatureTests/__Snapshots__ \
            Packages/PaywallFeature/Tests/PaywallFeatureTests/__Snapshots__

      - name: Upload snapshot diagnostics
        if: ${{ failure() && needs.scope.outputs.storekit_only != 'true' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-snapshot-diagnostics
          if-no-files-found: ignore
          retention-days: 7
          path: |
            ${{ runner.temp }}/AppFeatureSnapshots.xcresult
            ${{ runner.temp }}/PaywallFeatureSnapshots.xcresult
            Packages/AppFeature/Tests/AppFeatureTests/__Snapshots__/*-FAIL.png
            Packages/PaywallFeature/Tests/PaywallFeatureTests/__Snapshots__/*-FAIL.png

      # CF_STUB_SERVER and CF_UITEST_BYPASS_AUTH are set per-test in CFUITestCase.setUp()
      # via app.launchEnvironment — no extra xcodebuild env flags needed here.
      # SmokeLane tests call requireRealAPI() which issues XCTSkip unless CF_REAL_API=1.
      - name: Run XCUITest flows
        if: needs.scope.outputs.storekit_only != 'true'
        run: |
          set -o pipefail
          xcodebuild test \
            -project ChapterFlow.xcodeproj \
            -scheme ChapterFlow \
            -destination "platform=iOS Simulator,id=$SIM_ID" \
            -only-testing:ChapterFlowUITests \
            -skip-testing:ChapterFlowUITests/PurchaseFlowTests/testStoreKitCatalogPurchaseRelaunchAndRestoreCompletes \
            -parallel-testing-enabled NO \
            -testLanguage en \
            -testRegion US \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation \
            -skipMacroValidation

  # ── 4. Local StoreKit purchase contract ────────────────────────────────────
  # Keep StoreKit on its own runner/runtime pair. iOS 26.2 accepted the save
  # request but could not read the persisted Octane catalog, then routed
  # Product.products(for:) to Media API under headless xcodebuild. The macos-15
  # image provides Xcode 26.2 and iOS 26.1, the unaffected CLI pairing. Normal
  # UI work remains parallel on macos-26 and the required aggregator below
  # fails unless both lanes pass.
  storekit:
    name: StoreKit Purchase Contract
    runs-on: macos-15
    needs: [scope, build-and-test]
    if: ${{ always() }}

    steps:
      - name: Require valid prerequisites
        env:
          BUILD_RESULT: ${{ needs.build-and-test.result }}
          SCOPE_RESULT: ${{ needs.scope.result }}
        run: |
          if [[ "$SCOPE_RESULT" != "success" || "$BUILD_RESULT" != "success" ]]; then
            echo '::error title=StoreKit prerequisites failed::The purchase contract cannot replace failed prerequisite evidence.'
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Cache SPM repositories
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm/repositories
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Run StoreKit Test purchase and restore contract
        shell: bash
        timeout-minutes: 45
        run: |
          set -euo pipefail
          result="$RUNNER_TEMP/StoreKitPurchase.xcresult"

          storekit_xcode=/Applications/Xcode_26.2.app/Contents/Developer
          if [[ ! -d "$storekit_xcode" ]]; then
            echo '::error title=StoreKit Xcode unavailable::The StoreKit contract requires the hosted Xcode 26.2 installation paired with iOS 26.1.'
            exit 1
          fi
          export DEVELOPER_DIR="$storekit_xcode"
          xcodebuild -version
          python3 scripts/tests/test-storekit-catalog.py

          runtime_id="com.apple.CoreSimulator.SimRuntime.iOS-26-1"
          storekit_runtime_available() {
            xcrun simctl list runtimes available -j | \
              STOREKIT_RUNTIME_ID="$runtime_id" python3 -c '
          import json, os, sys
          expected = os.environ["STOREKIT_RUNTIME_ID"]
          raise SystemExit(0 if any(
              runtime.get("identifier") == expected and runtime.get("isAvailable", True)
              for runtime in json.load(sys.stdin).get("runtimes", [])
          ) else 1)
          '
          }

          if ! storekit_runtime_available; then
            echo '::error title=StoreKit runtime unavailable::The hosted macos-15 runner does not provide the required iOS 26.1 simulator runtime. Do not fall forward to the broken iOS 26.2+ CLI path or weaken the exact test.'
            exit 1
          fi

          storekit_sim_id="$(xcrun simctl create \
            'ChapterFlow StoreKit iOS 26.1' \
            com.apple.CoreSimulator.SimDeviceType.iPhone-17-Pro \
            "$runtime_id")"
          cleanup_storekit_simulator() {
            xcrun simctl shutdown "$storekit_sim_id" 2>/dev/null || true
            xcrun simctl delete "$storekit_sim_id" 2>/dev/null || true
          }
          trap cleanup_storekit_simulator EXIT
          xcrun simctl boot "$storekit_sim_id"
          xcrun simctl bootstatus "$storekit_sim_id" -b

          NSUnbufferedIO=YES xcodebuild test \
            -project ChapterFlow.xcodeproj \
            -scheme ChapterFlow-StoreKitTest \
            -testPlan ChapterFlow-StoreKitTest \
            -destination "platform=iOS Simulator,id=$storekit_sim_id" \
            -resultBundlePath "$result" \
            -only-testing:ChapterFlowUITests/PurchaseFlowTests/testStoreKitCatalogPurchaseRelaunchAndRestoreCompletes \
            -parallel-testing-enabled NO \
            -test-timeouts-enabled YES \
            -default-test-execution-time-allowance 180 \
            -maximum-test-execution-time-allowance 300 \
            -testLanguage en \
            -testRegion US \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation \
            -skipMacroValidation

          xcrun xcresulttool get test-results summary \
            --path "$result" \
            --format json |
            python3 -c '
          import json, sys
          result = json.load(sys.stdin)
          counts = (
              result.get("passedTests"),
              result.get("failedTests"),
              result.get("skippedTests"),
          )
          if counts != (1, 0, 0):
              raise SystemExit(f"StoreKit purchase test count mismatch: {counts}")
          '

      - name: Upload StoreKit purchase diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: storekit-purchase-diagnostics
          if-no-files-found: ignore
          retention-days: 7
          path: ${{ runner.temp }}/StoreKitPurchase.xcresult

  # Preserve the required check name while allowing the hermetic and StoreKit
  # lanes to run on different compatible hosts. Recovery accepts a skipped
  # hermetic lane only after the fail-closed scope job proves the exact diff.
  uitest:
    name: XCUITest Flows
    runs-on: ubuntu-latest
    needs: [scope, build-and-test, ui-flows, storekit]
    if: ${{ always() }}

    steps:
      - name: Require all applicable UI lanes
        env:
          BUILD_RESULT: ${{ needs.build-and-test.result }}
          HERMETIC_RESULT: ${{ needs.ui-flows.result }}
          SCOPE_RESULT: ${{ needs.scope.result }}
          STOREKIT_ONLY: ${{ needs.scope.outputs.storekit_only }}
          STOREKIT_RESULT: ${{ needs.storekit.result }}
        run: |
          set -euo pipefail
          if [[ "$SCOPE_RESULT" != "success" \
            || "$BUILD_RESULT" != "success" \
            || "$STOREKIT_RESULT" != "success" ]]; then
            echo '::error title=Required UI lane failed::Scope, build, and StoreKit must all succeed.'
            exit 1
          fi

          if [[ "$STOREKIT_ONLY" == "true" ]]; then
            if [[ "$HERMETIC_RESULT" != "skipped" ]]; then
              echo '::error title=Invalid recovery execution::The hermetic UI lane must be skipped in StoreKit-only recovery.'
              exit 1
            fi
          elif [[ "$HERMETIC_RESULT" != "success" ]]; then
            echo '::error title=Hermetic UI lane failed::Normal CI requires the complete deterministic UI flow job.'
            exit 1
          fi
