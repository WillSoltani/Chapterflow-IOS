name: PR — Build, Test & Lint

# Runs on every PR targeting main and on direct pushes to main.
# Configure "build-and-test" and "lint" as required status checks
# in Settings → Branches → Branch protection rules for `main`.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint (strict)
        # github-actions-logging emits ::error:: annotations inline in the PR diff.
        run: swiftlint lint --strict --reporter github-actions-logging

  # ── 2. Build (iOS Simulator) + Unit Tests (all local packages) ───────────
  build-and-test:
    name: Build & Test
    # macos-26 ships Xcode 26 (iOS 26 SDK), which the app REQUIRES: RF5's Liquid
    # Glass APIs (.glassEffect, .buttonStyle(.glass)) do not exist in the iOS 18.x
    # SDK on macos-15's default Xcode, so #available(iOS 26) guards cannot save a
    # build there — the symbols are simply absent. Both the xcodebuild build and
    # the `swift test` of DesignSystem need the 26 toolchain.
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      # Select the newest installed Xcode 26 explicitly (no-op if already default)
      # and fail loudly, listing what IS available, if 26 is somehow missing.
      - name: Select Xcode 26
        run: |
          echo "Installed Xcodes:"; ls -d /Applications/Xcode*.app 2>/dev/null || true
          latest26="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          if [ -n "$latest26" ]; then
            sudo xcode-select -s "$latest26/Contents/Developer"
          fi
          xcodebuild -version

      # Cache SPM state across runs:
      #  - the bare git repos (dependency source) used by both xcodebuild and swift test
      #  - the SHARED .build directory (see the test step) holding compiled dependency
      #    products — Amplify + the AWS SDK are large and otherwise recompile from source
      #    on every run.
      # Key: hash of every Package.resolved; restore-keys let an out-of-date cache seed an
      # incremental rebuild (SwiftPM re-verifies and rebuilds only what changed, so a stale
      # hit is never incorrect — at worst it rebuilds).
      - name: Cache SPM repositories & build
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm/repositories
            .spm-build
          # v2 bumps the key so the first run under this workflow SAVES a new cache that
          # includes .spm-build (a same-key hit would restore the old repos-only entry and
          # never re-save). Bump this suffix to invalidate the build cache.
          key: ${{ runner.os }}-spm-v2-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-v2-

      # Secrets.xcconfig is gitignored; CI uses placeholder values so the
      # project file resolves correctly. No real keys are needed for a build check.
      - name: Create Secrets.xcconfig
        run: cp Secrets.example.xcconfig Secrets.xcconfig

      # Build the full app target for an iOS Simulator.
      # -skipPackagePluginValidation bypasses Xcode's trust prompt for
      #   Amplify's SmithyCodeGenerator build-tool plugin.
      # -skipMacroValidation bypasses Xcode's macro sandbox trust prompt.
      # CODE_SIGN_* settings disable signing (not required for simulator builds).
      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project ChapterFlow.xcodeproj \
            -scheme ChapterFlow \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation \
            -skipMacroValidation

      # All local packages declare .macOS(.v14+) for exactly this use-case:
      # fast host-toolchain testing in CI without needing a booted simulator.
      # AuthKit is included; its Amplify build-tool plugin runs automatically
      # (build-tool plugins don't require interactive approval like command plugins).
      # AppFeature is excluded: it requires macOS 15 Swift stdlib for the Tab {} API
      # and all its constituent logic is covered by the per-module test runs below.
      - name: Run unit tests — all local packages
        shell: bash
        run: |
          set -uo pipefail
          failed=()

          packages=(
            Models
            CoreKit
            Networking
            Fixtures
            DesignSystem
            AIFeature
            AuthKit
            EngagementFeature
            LibraryFeature
            NotificationsFeature
            OnboardingFeature
            PaywallFeature
            Persistence
            QuizFeature
            ReaderFeature
            SettingsFeature
            SocialFeature
          )

          # Share ONE build directory across every package's test run. The packages
          # form a diamond over CoreKit/Networking/Persistence/Models and the large
          # Amplify + AWS SDK graph; with a per-package .build each dependent recompiles
          # that whole graph independently (Amplify built ~17×). A shared --scratch-path
          # lets SwiftPM compile each dependency ONCE and reuse it. The loop is sequential,
          # so there are no concurrent writers to the shared directory.
          scratch="$GITHUB_WORKSPACE/.spm-build"

          for pkg in "${packages[@]}"; do
            echo "──────────────── Testing $pkg ────────────────"
            if swift test --package-path "Packages/$pkg" --scratch-path "$scratch" --parallel; then
              echo "✓ $pkg passed"
            else
              echo "✗ $pkg FAILED"
              failed+=("$pkg")
            fi
          done

          if [ ${#failed[@]} -gt 0 ]; then
            echo ""
            echo "❌ Failed packages: ${failed[*]}"
            exit 1
          fi
          echo ""
          echo "✅ All packages passed"

      - name: Verify WP-DEV-01 non-Debug compile boundaries
        shell: bash
        env:
          COREKIT_RELEASE_SCRATCH_PATH: ${{ github.workspace }}/.spm-build
        run: scripts/verify-wp-dev-01-compile-boundaries.sh

  # ── 3. XCUITest flows (stub server, deterministic) ───────────────────────────
  # Runs the three critical UI flows (sign-in, read→quiz→unlock, purchase) against
  # a URLProtocol stub server fed by Fixtures. SmokeLane tests auto-skip unless
  # CF_REAL_API=1, so this job is always fully deterministic.
  # Required to merge; smoke lane skips are NOT treated as failures.
  uitest:
    name: XCUITest Flows
    runs-on: macos-26
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          echo "Installed Xcodes:"; ls -d /Applications/Xcode*.app 2>/dev/null || true
          latest26="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          if [ -n "$latest26" ]; then
            sudo xcode-select -s "$latest26/Contents/Developer"
          fi
          xcodebuild -version

      - name: Cache SPM repositories
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm/repositories
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Create Secrets.xcconfig
        run: cp Secrets.example.xcconfig Secrets.xcconfig

      # Boot the simulator before xcodebuild to avoid cold-start races.
      # Pick the first available iPhone by UDID (sorted newest runtime first)
      # so this step is robust to device-name changes across runner images.
      - name: Boot an available iPhone simulator
        run: |
          SIM_ID="$(xcrun simctl list devices available -j | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          # newest runtime first, first iPhone device that's available
          for rt, devs in sorted(d['devices'].items(), reverse=True):
              for dev in devs:
                  if dev.get('isAvailable') and dev['name'].startswith('iPhone'):
                      print(dev['udid']); raise SystemExit(0)
          raise SystemExit(1)
          ")"
          if [ -z "$SIM_ID" ]; then echo 'No available iPhone simulator'; xcrun simctl list devices available; exit 1; fi
          echo "SIM_ID=$SIM_ID" >> "$GITHUB_ENV"
          echo "Booting $SIM_ID"
          xcrun simctl boot "$SIM_ID" 2>/dev/null || true
          xcrun simctl bootstatus "$SIM_ID" -b

      # CF_STUB_SERVER and CF_UITEST_BYPASS_AUTH are set per-test in CFUITestCase.setUp()
      # via app.launchEnvironment — no extra xcodebuild env flags needed here.
      # SmokeLane tests call requireRealAPI() which issues XCTSkip unless CF_REAL_API=1.
      - name: Run XCUITest flows
        run: |
          set -o pipefail
          xcodebuild test \
            -project ChapterFlow.xcodeproj \
            -scheme ChapterFlow \
            -destination "platform=iOS Simulator,id=$SIM_ID" \
            -only-testing:ChapterFlowUITests \
            -parallel-testing-enabled NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -skipPackagePluginValidation \
            -skipMacroValidation
